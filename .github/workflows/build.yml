name: Build Windows exe

# Builds a standalone Windows .exe on GitHub's free Windows machines.
# Runs automatically on every push, and can be started by hand from the
# Actions tab (the "Run workflow" button).

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: python -m pip install --upgrade pyinstaller

      - name: Build the exe
        run: >
          python -m PyInstaller --noconfirm --onefile --windowed
          --name "RenameHelper" rename_zalif.py

      - name: Upload the finished exe
        uses: actions/upload-artifact@v4
        with:
          name: RenameHelper-windows
          path: dist/RenameHelper.exe
